name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Clear Metro bundler cache
        run: rm -rf $TMPDIR/metro-* $TMPDIR/haste-* || true

      - name: Remove hardcoded Java home from gradle.properties
        run: sed -i '/org.gradle.java.home/d' android/gradle.properties

      - name: Reduce Gradle JVM memory for CI
        run: sed -i 's/-Xmx20048m/-Xmx4096m/' android/gradle.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sahaya-latest-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 14

      - name: Delete existing latest release
        run: gh release delete latest --yes --cleanup-tag || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create latest GitHub Release
        run: |
          gh release create latest \
            android/app/build/outputs/apk/release/app-release.apk \
            --title "Latest Build" \
            --notes "Automated build from commit ${{ github.sha }}. Updated on: $(date -u '+%Y-%m-%d %H:%M UTC')"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
