name: Build Android APK

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Install dependencies
        run: yarn install --no-frozen-lockfile

      - name: Remove incompatible and crash-causing modules
        run: |
          rm -rf node_modules/react-native-localization || true
          rm -rf node_modules/react-localization || true
          rm -rf node_modules/localized-strings || true
          rm -rf node_modules/react-native-worklets || true
          rm -rf node_modules/@react-native-community/voice || true
          rm -rf node_modules/react-native-audio-record || true
          rm -rf node_modules/react-native-avoid-softinput || true
          find node_modules -name "LocalizedStrings.js" -delete 2>/dev/null || true

      - name: Clear Metro bundler cache
        run: rm -rf $TMPDIR/metro-* $TMPDIR/haste-* || true

      - name: Remove hardcoded Java home from gradle.properties
        run: sed -i '/org.gradle.java.home/d' android/gradle.properties

      - name: Reduce Gradle JVM memory for CI
        run: sed -i 's/-Xmx20048m/-Xmx4096m/' android/gradle.properties

      - name: Disable New Architecture for compatibility
        run: sed -i 's/newArchEnabled=true/newArchEnabled=false/' android/gradle.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Delete existing latest release
        run: gh release delete latest --yes --cleanup-tag || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create latest GitHub Release
        run: |
          for i in 1 2 3; do
            gh release create latest \
              android/app/build/outputs/apk/release/app-release.apk \
              --title "Latest Build" \
              --notes "Automated build from commit ${{ github.sha }}

          **Download the APK below to install on your Android device.**

          Updated on: $(date -u '+%Y-%m-%d %H:%M UTC')" && break
            echo "Attempt $i failed, retrying in 15 seconds..."
            sleep 15
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
